<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DailyRec — Reconciliación Diaria</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1e1e22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eff2;
    --muted: #7a7980;
    --accent: #c8fb5a;
    --accent-dim: rgba(200,251,90,0.12);
    --red: #ff5c5c;
    --red-dim: rgba(255,92,92,0.12);
    --amber: #ffb84d;
    --amber-dim: rgba(255,184,77,0.12);
    --green: #4ddb8a;
    --green-dim: rgba(77,219,138,0.1);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(15,15,17,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--muted); }

  #date-display {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* MAIN LAYOUT */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* UPLOAD SECTION */
  .upload-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 640px) { .upload-grid { grid-template-columns: 1fr; } }

  .upload-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .upload-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--border2);
    transition: background 0.2s;
  }

  .upload-card.loaded::before { background: var(--accent); }
  .upload-card.loaded { border-color: rgba(200,251,90,0.2); }

  .upload-card .sys-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .upload-card .sys-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
  }

  .upload-card input[type="file"] {
    width: 100%;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-family: var(--font);
  }

  .upload-card input[type="file"]::file-selector-button {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: var(--font);
    margin-right: 8px;
  }

  .file-status {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    min-height: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-status.ok { color: var(--accent); }

  /* RUN BUTTON */
  #run-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0f0f11;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 2rem;
    letter-spacing: 0.02em;
  }

  #run-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  #run-btn:not(:disabled):hover { opacity: 0.9; }
  #run-btn:not(:disabled):active { transform: scale(0.99); }

  /* METRICS */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }

  .metric-card .m-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .metric-card .m-val {
    font-size: 28px;
    font-weight: 600;
    font-family: var(--mono);
    line-height: 1;
  }

  .metric-card.c-green .m-val { color: var(--green); }
  .metric-card.c-red .m-val { color: var(--red); }
  .metric-card.c-amber .m-val { color: var(--amber); }
  .metric-card .m-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* FILTERS */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .pill {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .pill:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .pill.f-all.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color: var(--text); }
  .pill.f-missing.active { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .pill.f-diff.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 12px 6px 32px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: rgba(255,255,255,0.25); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 700px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border2);
  }

  th {
    padding: 10px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
  }

  td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }

  tbody tr:hover td { background: rgba(255,255,255,0.02); }

  .sys-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    font-family: var(--mono);
  }

  .sys-ST { background: rgba(200,251,90,0.12); color: var(--accent); }
  .sys-GS { background: rgba(147,147,255,0.12); color: #9393ff; }
  .sys-VCLT { background: rgba(255,184,77,0.1); color: var(--amber); }

  .status-badge {
    display: inline-block;
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 99px;
    font-weight: 500;
  }

  .status-missing { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,92,92,0.25); }
  .status-diff { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,184,77,0.25); }
  .status-paired { background: var(--green-dim); color: var(--green); border: 1px solid rgba(77,219,138,0.2); }

  .diff-neg { color: var(--red); }
  .diff-pos { color: var(--green); }

  /* TABLE FOOTER */
  .table-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .table-footer span { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  /* EXPORT */
  #export-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 1rem;
  }

  #export-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 13px;
  }

  /* HIDDEN */
  #results { display: none; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 999;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">daily<span>/</span>rec</div>
  <div id="date-display"></div>
</header>

<main>

  <div class="upload-grid">
    <div class="upload-card" id="card-st">
      <div class="sys-label">Sistema 1</div>
      <div class="sys-name">ST Blotter</div>
      <input type="file" id="file-st" accept=".xlsx,.csv" />
      <div class="file-status" id="st-status">Sin cargar</div>
    </div>
    <div class="upload-card" id="card-gs">
      <div class="sys-label">Sistema 2</div>
      <div class="sys-name">GS</div>
      <input type="file" id="file-gs" accept=".xlsx,.csv" />
      <div class="file-status" id="gs-status">Sin cargar</div>
    </div>
    <div class="upload-card" id="card-vclt">
      <div class="sys-label">Sistema 3</div>
      <div class="sys-name">VCLT_TRD</div>
      <input type="file" id="file-vclt" accept=".csv,.xlsx" />
      <div class="file-status" id="vclt-status">Sin cargar</div>
    </div>
  </div>

  <button id="run-btn" disabled>Correr reconciliación</button>

  <div id="results">
    <div class="metrics-grid" id="metrics-row"></div>

    <div class="controls">
      <button class="pill f-all active" id="f-all" onclick="setFilter('all')">Todos</button>
      <button class="pill f-missing" id="f-missing" onclick="setFilter('missing')">One side missing</button>
      <button class="pill f-diff" id="f-diff" onclick="setFilter('diff')">Diferencia</button>
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Buscar símbolo, cuenta..." oninput="renderTable()" />
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Sistema</th>
              <th>Cuenta</th>
              <th>Tipo</th>
              <th>Símbolo</th>
              <th>Qty</th>
              <th>Precio</th>
              <th>Net Amt</th>
              <th>Estado</th>
              <th>Dif ($)</th>
            </tr>
          </thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
      <div class="table-footer">
        <span id="row-count">—</span>
        <button id="export-btn" onclick="exportCSV()">↓ Exportar CSV</button>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
  document.getElementById('date-display').textContent = new Date().toLocaleDateString('es', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  let allRows = [];
  let currentFilter = 'all';
  let filesLoaded = { st: false, gs: false, vclt: false };

  function updateBtn() {
    document.getElementById('run-btn').disabled = !(filesLoaded.st && filesLoaded.gs && filesLoaded.vclt);
  }

  function setStatus(cardId, statusId, filename, ok) {
    const el = document.getElementById(statusId);
    el.textContent = ok ? '✓ ' + filename : filename;
    el.className = 'file-status' + (ok ? ' ok' : '');
    document.getElementById(cardId).classList.toggle('loaded', ok);
  }

  document.getElementById('file-st').onchange = function () {
    if (this.files[0]) { filesLoaded.st = true; setStatus('card-st', 'st-status', this.files[0].name, true); updateBtn(); }
  };
  document.getElementById('file-gs').onchange = function () {
    if (this.files[0]) { filesLoaded.gs = true; setStatus('card-gs', 'gs-status', this.files[0].name, true); updateBtn(); }
  };
  document.getElementById('file-vclt').onchange = function () {
    if (this.files[0]) { filesLoaded.vclt = true; setStatus('card-vclt', 'vclt-status', this.files[0].name, true); updateBtn(); }
  };

  async function readFile(inputId) {
    return new Promise((resolve) => {
      const file = document.getElementById(inputId).files[0];
      const reader = new FileReader();
      reader.onload = (e) => {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        resolve(XLSX.utils.sheet_to_json(ws, { defval: '' }));
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function norm(v) { return String(v || '').trim().toUpperCase().replace(/\s+/g, ''); }
  function makeKey(acct, type, symbol, qty) {
    return norm(acct) + '|' + norm(type) + '|' + norm(symbol) + '|' + Math.abs(parseFloat(qty) || 0);
  }

  function findCol(keys, patterns) {
    return keys.find(k => patterns.some(p => new RegExp(p, 'i').test(k))) || '';
  }

  function addRows(data, system, rows) {
    if (!data.length) return;
    const keys = Object.keys(data[0]);
    const acctCol = findCol(keys, ['account']);
    const typeCol = findCol(keys, ['trd_type', 'activity.type', 'type', 'side']);
    const symCol  = findCol(keys, ['symbol', 'cusip', 'isin', 'ticker']);
    const qtyCol  = findCol(keys, ['qty', 'quantity', 'shares']);
    const priceCol = findCol(keys, ['price', 'trade.price', 'exec_price']);
    const netCol  = findCol(keys, ['n_amt', 'net', 'settle.net', 'amount', 'notional']);

    data.forEach(r => {
      const acct = String(r[acctCol] || '').trim();
      const rawType = String(r[typeCol] || '').trim();
      const sym  = String(r[symCol]  || '').trim();
      const qty  = Math.abs(parseFloat(r[qtyCol]  || 0));
      const price = Math.abs(parseFloat(r[priceCol] || 0));
      const net  = Math.abs(parseFloat(r[netCol]  || 0));
      if (!sym && !acct) return;

      let type = rawType;
      if (system === 'GS') {
        if (/sell/i.test(rawType)) type = 'S';
        else if (/buy/i.test(rawType)) type = 'B';
      }

      rows.push({ system, acct, type, sym, qty, price, net, key: makeKey(acct, type, sym, qty), status: '', diff: 0 });
    });
  }

  document.getElementById('run-btn').onclick = async function () {
    const btn = this;
    btn.textContent = 'Procesando...';
    btn.disabled = true;

    try {
      const [stRaw, gsRaw, vcltRaw] = await Promise.all([
        readFile('file-st'), readFile('file-gs'), readFile('file-vclt')
      ]);

      const rows = [];
      addRows(stRaw, 'ST', rows);
      addRows(gsRaw, 'GS', rows);
      addRows(vcltRaw, 'VCLT', rows);

      const keyMap = {};
      rows.forEach((r, i) => { if (!keyMap[r.key]) keyMap[r.key] = []; keyMap[r.key].push(i); });

      rows.forEach((r, i) => {
        const group = keyMap[r.key];
        if (group.length >= 2) {
          const partner = rows[group.find(j => j !== i)];
          r.diff = r.net - (partner ? partner.net : 0);
          r.status = Math.abs(r.diff) > 0.5 ? 'diff' : 'paired';
        } else {
          r.status = 'missing';
          r.diff = 0;
        }
      });

      allRows = rows;
      showResults();
      toast('Reconciliación completa');
    } catch (e) {
      toast('Error: ' + e.message);
    }

    btn.textContent = 'Correr reconciliación';
    btn.disabled = false;
  };

  function showResults() {
    document.getElementById('results').style.display = '';
    updateMetrics();
    renderTable();
  }

  function updateMetrics() {
    const paired  = allRows.filter(r => r.status === 'paired').length;
    const missing = allRows.filter(r => r.status === 'missing').length;
    const diff    = allRows.filter(r => r.status === 'diff').length;
    const totalDif = allRows.filter(r => r.status === 'diff').reduce((s, r) => s + Math.abs(r.diff), 0);

    document.getElementById('metrics-row').innerHTML = `
      <div class="metric-card c-green">
        <div class="m-label">Paired</div>
        <div class="m-val">${paired}</div>
        <div class="m-sub">trades emparejados</div>
      </div>
      <div class="metric-card c-red">
        <div class="m-label">One side missing</div>
        <div class="m-val">${missing}</div>
        <div class="m-sub">sin contraparte</div>
      </div>
      <div class="metric-card c-amber">
        <div class="m-label">Con diferencia</div>
        <div class="m-val">${diff}</div>
        <div class="m-sub">amounts no coinciden</div>
      </div>
      <div class="metric-card">
        <div class="m-label">Dif. total</div>
        <div class="m-val" style="font-size:20px;">$${totalDif.toLocaleString('en', {maximumFractionDigits:0})}</div>
        <div class="m-sub">suma de diferencias</div>
      </div>
    `;
  }

  function setFilter(f) {
    currentFilter = f;
    ['all', 'missing', 'diff'].forEach(x => {
      const el = document.getElementById('f-' + x);
      if (el) el.className = 'pill f-' + x + (x === f ? ' active' : '');
    });
    renderTable();
  }

  function renderTable() {
    const search = (document.getElementById('search').value || '').toLowerCase();
    const filtered = allRows.filter(r => {
      if (currentFilter !== 'all' && r.status !== currentFilter) return false;
      if (search && !r.sym.toLowerCase().includes(search) && !r.acct.toLowerCase().includes(search) && !r.type.toLowerCase().includes(search)) return false;
      return true;
    });

    document.getElementById('row-count').textContent = filtered.length + ' filas';

    const tbody = document.getElementById('tbl-body');
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="9"><div class="empty">Sin resultados para este filtro</div></td></tr>';
      return;
    }

    tbody.innerHTML = filtered.slice(0, 1000).map(r => {
      const sysBadge = `<span class="sys-badge sys-${r.system}">${r.system}</span>`;
      const statusBadge = r.status === 'missing'
        ? '<span class="status-badge status-missing">missing</span>'
        : r.status === 'diff'
        ? '<span class="status-badge status-diff">diferencia</span>'
        : '<span class="status-badge status-paired">paired</span>';
      const difStr = r.status === 'missing' ? '—'
        : r.diff === 0 ? '—'
        : `<span class="${r.diff < 0 ? 'diff-neg' : 'diff-pos'}">${r.diff > 0 ? '+' : ''}${r.diff.toFixed(2)}</span>`;

      return `<tr>
        <td>${sysBadge}</td>
        <td>${r.acct || '—'}</td>
        <td>${r.type || '—'}</td>
        <td><strong>${r.sym || '—'}</strong></td>
        <td>${r.qty.toLocaleString()}</td>
        <td>${r.price ? r.price.toFixed(4) : '—'}</td>
        <td>${r.net ? '$' + r.net.toLocaleString('en', {maximumFractionDigits:0}) : '—'}</td>
        <td>${statusBadge}</td>
        <td>${difStr}</td>
      </tr>`;
    }).join('');
  }

  function exportCSV() {
    const headers = ['Sistema', 'Cuenta', 'Tipo', 'Simbolo', 'Qty', 'Precio', 'Net Amt', 'Estado', 'Dif'];
    const search = (document.getElementById('search').value || '').toLowerCase();
    const toExport = allRows.filter(r => {
      if (currentFilter !== 'all' && r.status !== currentFilter) return false;
      if (search && !r.sym.toLowerCase().includes(search) && !r.acct.toLowerCase().includes(search)) return false;
      return true;
    });
    const csv = [headers, ...toExport.map(r =>
      [r.system, r.acct, r.type, r.sym, r.qty, r.price.toFixed(4), r.net.toFixed(2), r.status, r.diff.toFixed(2)]
    )].map(row => row.join(',')).join('\n');

    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'DailyRec_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
    toast('CSV exportado');
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
