<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DailyRec — Reconciliación Diaria</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f11; --surface: #17171a; --surface2: #1e1e22;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f0eff2; --muted: #7a7980;
  --accent: #c8fb5a;
  --red: #ff5c5c; --red-dim: rgba(255,92,92,0.12);
  --amber: #ffb84d; --amber-dim: rgba(255,184,77,0.12);
  --green: #4ddb8a; --green-dim: rgba(77,219,138,0.1);
  --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }
header { border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(15,15,17,0.95); backdrop-filter: blur(12px); z-index: 100; }
.logo { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--accent); }
.logo span { color: var(--muted); }
#date-display { font-family: var(--mono); font-size: 12px; color: var(--muted); }
main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

/* UPLOAD */
.upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
@media(max-width:640px){.upload-grid{grid-template-columns:1fr;}}
.upload-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; position: relative; overflow: hidden; transition: border-color 0.2s; }
.upload-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--border2); transition:background 0.2s; }
.upload-card.loaded::before { background: var(--accent); }
.upload-card.loaded { border-color: rgba(200,251,90,0.2); }
.sys-label { font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
.sys-name { font-size:16px; font-weight:600; margin-bottom:12px; }
.upload-card input[type=file] { width:100%; font-size:12px; color:var(--muted); background:var(--surface2); border:1px solid var(--border2); border-radius:6px; padding:6px 10px; cursor:pointer; font-family:var(--font); }
.upload-card input[type=file]::file-selector-button { background:var(--surface); border:1px solid var(--border2); color:var(--text); border-radius:4px; padding:3px 10px; font-size:11px; cursor:pointer; margin-right:8px; }
.file-status { margin-top:8px; font-size:11px; color:var(--muted); font-family:var(--mono); min-height:16px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-status.ok { color:var(--accent); }

/* BUTTON */
#run-btn { width:100%; padding:14px; background:var(--accent); color:#0f0f11; border:none; border-radius:10px; font-size:14px; font-weight:600; font-family:var(--font); cursor:pointer; transition:opacity 0.15s; margin-bottom:2rem; }
#run-btn:disabled { opacity:0.25; cursor:not-allowed; }
#run-btn:not(:disabled):hover { opacity:0.9; }

/* TABS */
.tabs { display:flex; gap:4px; margin-bottom:1.5rem; border-bottom:1px solid var(--border); }
.tab { padding:10px 20px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; background:none; border-top:none; border-left:none; border-right:none; font-family:var(--font); }
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* METRICS */
.metrics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:1.5rem; }
.metric-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; }
.m-label { font-size:11px; color:var(--muted); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
.m-val { font-size:26px; font-weight:600; font-family:var(--mono); line-height:1; }
.m-sub { font-size:11px; color:var(--muted); margin-top:4px; }
.c-green .m-val { color:var(--green); }
.c-red .m-val { color:var(--red); }
.c-amber .m-val { color:var(--amber); }

/* CONTROLS */
.controls { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.pill { font-size:12px; padding:5px 14px; border-radius:99px; border:1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; font-family:var(--font); transition:all 0.15s; }
.pill:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }
.pill.f-all.active { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.2); color:var(--text); }
.pill.f-missing.active { background:var(--red-dim); border-color:var(--red); color:var(--red); }
.pill.f-diff.active { background:var(--amber-dim); border-color:var(--amber); color:var(--amber); }
.search-wrap { flex:1; min-width:160px; position:relative; }
.search-wrap input { width:100%; background:var(--surface); border:1px solid var(--border2); border-radius:8px; padding:6px 12px 6px 30px; color:var(--text); font-size:13px; font-family:var(--font); outline:none; }
.search-wrap input:focus { border-color:rgba(255,255,255,0.25); }
.search-wrap input::placeholder { color:var(--muted); }
.search-wrap::before { content:'⌕'; position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:15px; pointer-events:none; }

/* TABLE */
.table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.table-scroll { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; min-width:750px; }
thead tr { background:var(--surface2); border-bottom:1px solid var(--border2); }
th { padding:10px 14px; text-align:left; font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); font-weight:500; white-space:nowrap; }
td { padding:9px 14px; border-bottom:1px solid var(--border); color:var(--text); font-family:var(--mono); font-size:12px; white-space:nowrap; }
tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:rgba(255,255,255,0.02); }
.sys-badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:4px; font-weight:500; font-family:var(--mono); }
.sys-ST { background:rgba(200,251,90,0.12); color:var(--accent); }
.sys-GS { background:rgba(147,147,255,0.12); color:#9393ff; }
.sys-VCLT { background:rgba(255,184,77,0.1); color:var(--amber); }
.status-badge { display:inline-block; font-size:10px; padding:3px 9px; border-radius:99px; font-weight:500; }
.status-missing { background:var(--red-dim); color:var(--red); border:1px solid rgba(255,92,92,0.25); }
.status-diff { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(255,184,77,0.25); }
.status-paired { background:var(--green-dim); color:var(--green); border:1px solid rgba(77,219,138,0.2); }
.diff-neg { color:var(--red); } .diff-pos { color:var(--green); }
.table-footer { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-top:1px solid var(--border); background:var(--surface2); }
.table-footer span { font-size:12px; color:var(--muted); font-family:var(--mono); }
.export-btn { background:transparent; border:1px solid var(--border2); color:var(--text); padding:6px 16px; border-radius:8px; font-size:12px; font-family:var(--font); cursor:pointer; transition:all 0.15s; }
.export-btn:hover { border-color:var(--accent); color:var(--accent); }
.empty { text-align:center; padding:3rem; color:var(--muted); font-size:13px; }
#results { display:none; }
#toast { position:fixed; bottom:2rem; right:2rem; background:var(--surface2); border:1px solid var(--border2); border-radius:10px; padding:12px 18px; font-size:13px; color:var(--text); opacity:0; transform:translateY(8px); transition:all 0.2s; pointer-events:none; z-index:999; }
#toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>
<header>
  <div class="logo">daily<span>/</span>rec</div>
  <div id="date-display"></div>
</header>
<main>
  <div class="upload-grid">
    <div class="upload-card" id="card-st">
      <div class="sys-label">Base</div>
      <div class="sys-name">ST Blotter</div>
      <input type="file" id="file-st" accept=".xlsx,.csv" />
      <div class="file-status" id="st-status">Sin cargar</div>
    </div>
    <div class="upload-card" id="card-gs">
      <div class="sys-label">Contra 1</div>
      <div class="sys-name">GS</div>
      <input type="file" id="file-gs" accept=".xlsx,.csv" />
      <div class="file-status" id="gs-status">Sin cargar</div>
    </div>
    <div class="upload-card" id="card-vclt">
      <div class="sys-label">Contra 2</div>
      <div class="sys-name">VCLT_TRD</div>
      <input type="file" id="file-vclt" accept=".csv,.xlsx" />
      <div class="file-status" id="vclt-status">Sin cargar</div>
    </div>
  </div>

  <button id="run-btn" disabled>Correr reconciliación</button>

  <div id="results">
    <div class="tabs">
      <button class="tab active" id="tab-gs" onclick="switchTab('gs')">ST vs GS</button>
      <button class="tab" id="tab-vclt" onclick="switchTab('vclt')">ST vs VCLT</button>
    </div>

    <div id="panel-gs"></div>
    <div id="panel-vclt" style="display:none;"></div>
  </div>
</main>
<div id="toast"></div>

<script>
document.getElementById('date-display').textContent = new Date().toLocaleDateString('es',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

let recGS = [], recVCLT = [];
let filters = { gs: 'missing', vclt: 'missing' };
let currentTab = 'gs';
let filesLoaded = {st:false,gs:false,vclt:false};

function updateBtn() {
  document.getElementById('run-btn').disabled = !(filesLoaded.st && filesLoaded.gs && filesLoaded.vclt);
}
function setStatus(cardId, statusId, name, ok) {
  const el = document.getElementById(statusId);
  el.textContent = (ok?'✓ ':'')+name;
  el.className = 'file-status'+(ok?' ok':'');
  document.getElementById(cardId).classList.toggle('loaded',ok);
}
document.getElementById('file-st').onchange = function(){if(this.files[0]){filesLoaded.st=true;setStatus('card-st','st-status',this.files[0].name,true);updateBtn();}};
document.getElementById('file-gs').onchange = function(){if(this.files[0]){filesLoaded.gs=true;setStatus('card-gs','gs-status',this.files[0].name,true);updateBtn();}};
document.getElementById('file-vclt').onchange = function(){if(this.files[0]){filesLoaded.vclt=true;setStatus('card-vclt','vclt-status',this.files[0].name,true);updateBtn();}};

async function readFile(id) {
  return new Promise(resolve => {
    const file = document.getElementById(id).files[0];
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      resolve(XLSX.utils.sheet_to_json(ws,{defval:''}));
    };
    reader.readAsArrayBuffer(file);
  });
}

function normType(v, isGS) {
  const s = String(v||'').trim();
  if(isGS) return /sell/i.test(s)?'S':/buy/i.test(s)?'B':s.toUpperCase();
  return s.toUpperCase();
}
function makeKey(t,sym,qty) {
  return t+'|'+String(sym).trim().toUpperCase()+'|'+Math.round(Math.abs(parseFloat(String(qty||'0').replace(',',''))));
}

function reconcile(stData, otherData, otherSystem) {
  const isGS = otherSystem === 'GS';
  const rows = [];

  // Build other index
  const otherIdx = {};
  otherData.forEach(r => {
    let sym, type, qty, price, net, acct;
    if(isGS) {
      sym = String(r['Symbol']||'').trim();
      type = normType(r['Activity Type'],true);
      qty = r['Quantity'];
      price = r['Trade Price'];
      net = r['Settle Net Amount'];
      acct = String(r['Account']||'').trim();
    } else {
      sym = String(r['symbol']||'').trim();
      type = String(r['trd_type']||'').trim().toUpperCase();
      qty = r['qty'];
      price = r['price'];
      net = r['n_amt'];
      acct = String(r['account']||'').trim();
    }
    if(!sym) return;
    const k = makeKey(type,sym,qty);
    if(!otherIdx[k]) otherIdx[k] = [];
    otherIdx[k].push({sym,type,qty:Math.abs(parseFloat(qty||0)),price:Math.abs(parseFloat(price||0)),net:Math.abs(parseFloat(String(net||'0').replace(',',''))),acct});
  });

  const matchedKeys = new Set();

  // ST rows
  stData.forEach(r => {
    const sym = String(r['Symbol']||'').trim();
    if(!sym) return;
    const type = String(r['Instr']||'').trim().toUpperCase();
    const qty = Math.abs(parseFloat(r['ExQuan']||0));
    const price = Math.abs(parseFloat(r['ExPrice']||0));
    const net = Math.abs(parseFloat(r['NetMoneyinUSD']||0));
    const acct = String(r['Acct']||'').trim();
    const k = makeKey(type,sym,qty);

    if(otherIdx[k] && otherIdx[k].length > 0) {
      const partner = otherIdx[k][0];
      const diff = net - partner.net;
      const status = Math.abs(diff) > 1 ? 'diff' : 'paired';
      rows.push({side:'ST',acct,type,sym,qty,price,net,status,diff,partner_acct:partner.acct});
      rows.push({side:otherSystem,acct:partner.acct,type:partner.type,sym:partner.sym,qty:partner.qty,price:partner.price,net:partner.net,status,diff:-diff,partner_acct:acct});
      matchedKeys.add(k);
    } else {
      rows.push({side:'ST',acct,type,sym,qty,price,net,status:'missing',diff:0,partner_acct:''});
    }
  });

  // Other side missing in ST
  Object.entries(otherIdx).forEach(([k,list]) => {
    if(!matchedKeys.has(k)) {
      list.forEach(r => {
        rows.push({side:otherSystem,acct:r.acct,type:r.type,sym:r.sym,qty:r.qty,price:r.price,net:r.net,status:'missing',diff:0,partner_acct:''});
      });
    }
  });

  return rows;
}

document.getElementById('run-btn').onclick = async function() {
  const btn = this;
  btn.textContent = 'Procesando...';
  btn.disabled = true;
  try {
    const [stRaw,gsRaw,vcltRaw] = await Promise.all([readFile('file-st'),readFile('file-gs'),readFile('file-vclt')]);
    recGS = reconcile(stRaw, gsRaw, 'GS');
    recVCLT = reconcile(stRaw, vcltRaw, 'VCLT');
    document.getElementById('results').style.display = '';
    renderPanel('gs');
    renderPanel('vclt');
    toast('Listo — ST vs GS: '+recGS.length+' filas | ST vs VCLT: '+recVCLT.length+' filas');
  } catch(e) {
    toast('Error: '+e.message);
    console.error(e);
  }
  btn.textContent = 'Correr reconciliación';
  btn.disabled = false;
};

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-gs').className = 'tab'+(tab==='gs'?' active':'');
  document.getElementById('tab-vclt').className = 'tab'+(tab==='vclt'?' active':'');
  document.getElementById('panel-gs').style.display = tab==='gs'?'':'none';
  document.getElementById('panel-vclt').style.display = tab==='vclt'?'':'none';
}

function renderPanel(tab) {
  const data = tab==='gs' ? recGS : recVCLT;
  const otherSys = tab==='gs' ? 'GS' : 'VCLT';
  const filter = filters[tab];

  const paired  = data.filter(r=>r.status==='paired' && r.side==='ST').length;
  const missing = data.filter(r=>r.status==='missing').length;
  const diff    = data.filter(r=>r.status==='diff' && r.side==='ST').length;
  const totalDif = data.filter(r=>r.status==='diff'&&r.side==='ST').reduce((s,r)=>s+Math.abs(r.diff),0);

  const panel = document.getElementById('panel-'+tab);
  panel.innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card c-green"><div class="m-label">Paired</div><div class="m-val">${paired}</div><div class="m-sub">trades emparejados</div></div>
      <div class="metric-card c-red"><div class="m-label">Missing</div><div class="m-val">${missing}</div><div class="m-sub">sin contraparte</div></div>
      <div class="metric-card c-amber"><div class="m-label">Diferencia</div><div class="m-val">${diff}</div><div class="m-sub">amounts distintos</div></div>
      <div class="metric-card"><div class="m-label">Dif. total</div><div class="m-val" style="font-size:20px;">$${totalDif.toLocaleString('en',{maximumFractionDigits:0})}</div><div class="m-sub">suma diferencias</div></div>
    </div>
    <div class="controls">
      <button class="pill f-all${filter==='all'?' active':''}" onclick="setFilter('${tab}','all')">Todos</button>
      <button class="pill f-missing${filter==='missing'?' active':''}" onclick="setFilter('${tab}','missing')">Missing</button>
      <button class="pill f-diff${filter==='diff'?' active':''}" onclick="setFilter('${tab}','diff')">Diferencia</button>
      <div class="search-wrap"><input type="text" id="search-${tab}" placeholder="Buscar símbolo, cuenta..." oninput="renderRows('${tab}')" /></div>
    </div>
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Sistema</th><th>Cuenta</th><th>Tipo</th><th>Símbolo</th>
            <th>Qty</th><th>Precio</th><th>Net Amt (USD)</th><th>Estado</th><th>Dif ($)</th>
          </tr></thead>
          <tbody id="tbody-${tab}"></tbody>
        </table>
      </div>
      <div class="table-footer">
        <span id="count-${tab}">—</span>
        <button class="export-btn" onclick="exportCSV('${tab}')">↓ Exportar CSV</button>
      </div>
    </div>
  `;
  renderRows(tab);
}

function setFilter(tab, f) {
  filters[tab] = f;
  renderPanel(tab);
}

function renderRows(tab) {
  const data = tab==='gs' ? recGS : recVCLT;
  const filter = filters[tab];
  const search = (document.getElementById('search-'+tab)?.value||'').toLowerCase();

  const filtered = data.filter(r => {
    if(filter !== 'all' && r.status !== filter) return false;
    if(search && !r.sym.toLowerCase().includes(search) && !r.acct.toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('count-'+tab).textContent = filtered.length+' filas';
  const tbody = document.getElementById('tbody-'+tab);
  if(!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty">Sin resultados</div></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.slice(0,2000).map(r => {
    const sysBadge = `<span class="sys-badge sys-${r.side}">${r.side}</span>`;
    const statusBadge = r.status==='missing'
      ? '<span class="status-badge status-missing">missing</span>'
      : r.status==='diff'
      ? '<span class="status-badge status-diff">diferencia</span>'
      : '<span class="status-badge status-paired">paired</span>';
    const difStr = r.status==='missing'?'—':r.diff===0?'—':`<span class="${r.diff<0?'diff-neg':'diff-pos'}">${r.diff>0?'+':''}${r.diff.toFixed(2)}</span>`;
    return `<tr>
      <td>${sysBadge}</td>
      <td>${r.acct||'—'}</td>
      <td>${r.type||'—'}</td>
      <td><strong>${r.sym}</strong></td>
      <td>${r.qty.toLocaleString()}</td>
      <td>${r.price?r.price.toFixed(4):'—'}</td>
      <td>${r.net?'$'+r.net.toLocaleString('en',{maximumFractionDigits:0}):'—'}</td>
      <td>${statusBadge}</td>
      <td>${difStr}</td>
    </tr>`;
  }).join('');
}

function exportCSV(tab) {
  const data = tab==='gs'?recGS:recVCLT;
  const filter = filters[tab];
  const search = (document.getElementById('search-'+tab)?.value||'').toLowerCase();
  const toExport = data.filter(r=>{
    if(filter!=='all'&&r.status!==filter) return false;
    if(search&&!r.sym.toLowerCase().includes(search)&&!r.acct.toLowerCase().includes(search)) return false;
    return true;
  });
  const headers = ['Sistema','Cuenta','Tipo','Simbolo','Qty','Precio','Net Amt USD','Estado','Dif'];
  const csv = [headers,...toExport.map(r=>[r.side,r.acct,r.type,r.sym,r.qty,r.price.toFixed(4),r.net.toFixed(2),r.status,r.diff.toFixed(2)])].map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'DailyRec_ST_vs_'+(tab==='gs'?'GS':'VCLT')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exportado');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
}
</script>
</body>
</html>
